<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>3D Sapphire Anaglyph - Zoom Up</title>
<link rel="stylesheet" href="./style.css">
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.180.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.180.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<img id="scope" src="./images/scope.png" alt="scope">

<!-- ゲーム中のスコア・残り時間表示 -->
<div id="hud">
  <div id="hud-score">SCORE: 0</div>
  <div id="hud-time">TIME: 60</div>
</div>

<!-- タイトル画面 -->
<div id="title-screen" class="overlay">
  <h1>宝石シューティング(仮)</h1>
  <p>赤緑メガネをかけて見てください。<br>
     飛び出してくる宝石にスコープを合わせてクリックで撃ち落とそう!<br>
     制限時間は60秒です。</p>
  <button id="start-button">スタート</button>
</div>

<!-- 結果画面 -->
<div id="result-screen" class="overlay hidden">
  <h1>タイムアップ!</h1>
  <p id="result-score">SCORE: 0</p>
  <button id="retry-button">もう一度</button>
</div>

<script type="module" src="./main.js"></script>
</body>
</html>
