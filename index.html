<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>3D Sapphire Anaglyph - Zoom Up</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.180.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.180.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<script type="module">
import * as THREE from "three";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { AnaglyphEffect } from "three/addons/effects/AnaglyphEffect.js";

// ======================
// scene
// ======================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

// ======================
// camera（飛び出し強め）
// near を小さくして、かなり近くまで来ても消えないようにする
// ======================
const camera = new THREE.PerspectiveCamera(
  45,
  window.innerWidth / window.innerHeight,
  0.01,
  1000
);
camera.position.set(0, 1, 14);

// ======================
// renderer
// ======================
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ======================
// アナグリフ（視差を強めて立体感アップ）
// ======================
const effect = new AnaglyphEffect(renderer);
// デフォルトより視差を強くして「飛び出し感」を強調
// (値が大きいほど左右のズレが大きくなり、より立体的に見える)
if (typeof effect.setEyeSeparation === "function") {
  effect.setEyeSeparation(0.15);
}

// ======================
// light（宝石見えるように）
// ======================
scene.add(new THREE.AmbientLight(0xffffff, 1.2));
const light1 = new THREE.PointLight(0xffffff, 2);
light1.position.set(5, 5, 5);
scene.add(light1);
const light2 = new THREE.PointLight(0xffffff, 1.5);
light2.position.set(-5, 3, 5);
scene.add(light2);

// ======================
// GLB
// ======================
const loader = new GLTFLoader();
let gem;

// ---- 飛び出しの距離設定 ----
// START_Z: スタート地点（奥）
// END_Z  : カメラのすぐ手前まで迫る地点（ここまで来て初めてリセット）
// CAMERA_Z: カメラのz座標（近づき具合の計算に使用）
const START_Z = -30;
const END_Z = 11;          // カメラ(14)のすぐ手前。以前は-3で止まっていたのをここまで伸ばす
const CAMERA_Z = camera.position.z;
const BASE_SCALE = 3.5;
const MIN_SCALE_FACTOR = 0.7;
const MAX_SCALE_FACTOR = 3.2; // 手前に来た時、以前よりずっと大きく見せる

loader.load("./models/diamond.glb", (gltf) => {
  gem = gltf.scene;
  gem.scale.set(2.8, 2.8, 2.8);
  // 中心補正
  const box = new THREE.Box3().setFromObject(gem);
  const center = box.getCenter(new THREE.Vector3());
  gem.position.sub(center);
  gem.position.set(0, 0, START_Z);

  gem.traverse((child) => {
    if (child.isMesh) {
      // ======================
      // サファイア材質
      // ======================
      child.material = new THREE.MeshStandardMaterial({
        color: new THREE.Color(0x2b6cff),
        transparent: true,
        opacity: 0.85,
        metalness: 0.2,
        roughness: 0.05,
        emissive: new THREE.Color(0x0a1a3a),
        emissiveIntensity: 0.6
      });
      // ======================
      // カット線（ワイヤー）
      // ======================
      const wire = new THREE.LineSegments(
        new THREE.WireframeGeometry(child.geometry),
        new THREE.LineBasicMaterial({
          color: 0xffffff,
          transparent: true,
          opacity: 0.25
        })
      );
      child.add(wire);
    }
  });
  scene.add(gem);
});

// ======================
// animation（飛び出し）
// ======================
function animate() {
  requestAnimationFrame(animate);

  if (gem) {
    const t = Date.now() * 0.001;

    // 奥→手前（速度も少し上げてキレを出す）
    gem.position.z += 0.22;

    // 左右・上下にふわっと揺れる
    gem.position.x = Math.sin(t * 0.9) * 1.4;
    gem.position.y = Math.sin(t * 1.3) * 0.5;

    // 回転
    gem.rotation.y += 0.02;
    gem.rotation.x = Math.sin(t * 0.6) * 0.3;
    gem.rotation.z += 0.006;

    // 手前に来すぎたらリセット（以前よりずっと手前まで許可）
    if (gem.position.z > END_Z) {
      gem.position.z = START_Z;
    }

    // ---- スケール計算：近づくほど急激に大きくする（イージング） ----
    // 0(奥) 〜 1(カメラ直前) の進行度
    const progress = THREE.MathUtils.clamp(
      (gem.position.z - START_Z) / (END_Z - START_Z),
      0,
      1
    );
    // 2乗イージングで、手前に来たときの「グワッ」とした加速感を出す
    const eased = progress * progress;
    const d = THREE.MathUtils.lerp(MIN_SCALE_FACTOR, MAX_SCALE_FACTOR, eased);

    gem.scale.set(BASE_SCALE * d, BASE_SCALE * d, BASE_SCALE * d);
  }

  effect.render(scene, camera);
}
animate();

// ======================
// resize
// ======================
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
