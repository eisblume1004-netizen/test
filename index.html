<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>3D Sapphire Anaglyph</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
}
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.180.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.180.0/examples/jsm/"
  }
}
</script>
</head>

<body>

<script type="module">

import * as THREE from "three";
import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
import { AnaglyphEffect } from "three/addons/effects/AnaglyphEffect.js";

// ======================
// scene
// ======================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

// ======================
// camera（飛び出し強め）
// ======================
const camera = new THREE.PerspectiveCamera(
  45,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);
camera.position.set(0, 1, 14);

// ======================
// renderer
// ======================
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// ======================
// アナグリフ
// ======================
const effect = new AnaglyphEffect(renderer);

// ======================
// light（宝石見えるように）
// ======================
scene.add(new THREE.AmbientLight(0xffffff, 1.2));

const light1 = new THREE.PointLight(0xffffff, 2);
light1.position.set(5, 5, 5);
scene.add(light1);

const light2 = new THREE.PointLight(0xffffff, 1.5);
light2.position.set(-5, 3, 5);
scene.add(light2);

// ======================
// GLB
// ======================
const loader = new GLTFLoader();

let gem;

loader.load("./models/diamond.glb", (gltf) => {

  gem = gltf.scene;

  gem.scale.set(2.8, 2.8, 2.8);

  // 中心補正
  const box = new THREE.Box3().setFromObject(gem);
  const center = box.getCenter(new THREE.Vector3());
  gem.position.sub(center);

  gem.position.set(0, 0, -30);

  gem.traverse((child) => {
    if (child.isMesh) {

      // ======================
      // サファイア材質
      // ======================
      child.material = new THREE.MeshStandardMaterial({

        color: new THREE.Color(0x2b6cff),
        transparent: true,
        opacity: 0.85,

        metalness: 0.2,
        roughness: 0.05,

        emissive: new THREE.Color(0x0a1a3a),
        emissiveIntensity: 0.6
      });

      // ======================
      // カット線（ワイヤー）
      // ======================
      const wire = new THREE.LineSegments(
        new THREE.WireframeGeometry(child.geometry),
        new THREE.LineBasicMaterial({
          color: 0xffffff,
          transparent: true,
          opacity: 0.25
        })
      );

      child.add(wire);
    }
  });

  scene.add(gem);
});

// ======================
// animation（飛び出し）
// ======================
function animate() {
  requestAnimationFrame(animate);

  if (gem) {

    const t = Date.now() * 0.001;

    // 奥→手前
    gem.position.z += 0.16;

    // 左右・上下にふわっと揺れる
    gem.position.x = Math.sin(t * 0.9) * 1.4;
    gem.position.y = Math.sin(t * 1.3) * 0.5;

    // 回転
    gem.rotation.y += 0.02;
    gem.rotation.x = Math.sin(t * 0.6) * 0.3;
    gem.rotation.z += 0.006;

    // 手前に来すぎる前に戻す
    if (gem.position.z > -3) {
      gem.position.z = -30;
    }

    // 徐々に大きくする
    const d = THREE.MathUtils.clamp((gem.position.z + 30) / 30, 0.8, 1.2);
    gem.scale.set(3.0 * d, 3.0 * d, 3.0 * d);
  }

  effect.render(scene, camera);
}

animate();
// ======================
// resize
// ======================
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
